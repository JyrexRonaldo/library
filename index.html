<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/index.js" defer></script>
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/style.css">
    <title>Jyrex's Library</title>
</head>

<body>
    <div class="library">
        <h1>My book Library</h1>
        <p>A simple library for tracking books</p>
        <button type="button">NEW BOOK</button>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Author</th>
                    <th>pages</th>
                    <th>Read</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div class="form">
        <form action="">
            <h1>Add new book</h1>
            <div class="input">
                <div>
                    <input placeholder="Title" type="text" name="title" value="Bogdanov" id="">
                </div>
                <div>
                    <input placeholder="Author" type="text" name="author" id="">
                </div>
                <div>
                    <input placeholder="0" type="tel" name="pages" id="">
                </div>
                <div>
                    <label for="read">Have you read it?</label>
                    <input type="checkbox" name="read" id="read" value="true">
                </div>
            </div>
            <div class="submit">
                <button type="button">Submit</button>
            </div>
        </form>
    </div>
</body>

</html>
